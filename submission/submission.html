    <style type="text/css">
      html,

      #overlay-container {

      /* Bad buttons */

      }

      /* Popup ninja */
      #hover-ninja-popup {
        background: white;
        color: #333;
        border-radius: 8px;
        text-align: center;
        min-width: 280px;
        display: none;

        height: 50%;
        width: 50%;
        position: absolute;
        top: 25%;
        left: 25%;

        padding: 10px;
        align-items: center;
        flex-direction: column;
      }

      #hover-ninja-header {
        h2 {
          font-weight: 400;
        }
      }

      #hover-ninja-desc {
        font-weight: 100;
        margin-bottom: 30px;
      }

      #hover-ninja-input {
        position: relative;
        box-sizing: border-box;
        height: 100%;
        width: 100%;
      }

      #hover-ninja-submit {
        margin-top: 5px;
        border-radius: 8px;
        padding: 4px;
      }

      .fade-in {
        opacity: 1;
        animation-name: fadeInOpacity;
        animation-iteration-count: 1;
        animation-timing-function: ease-in;
        animation-duration: 0.6s;
      }

      @keyframes fadeInOpacity {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }

      #dissapearing-button {
        width: 145px;
        height: 44px;
      }
    </style>
  </head>

  <body>
    <div id="overlay-container">
      <div id="powered-by">
        <div>
          <span>Powered by:</span>
          <span id="powered-by-label"></span>
        </div>
        <div>
          <span id="powered-by-desc"></span>
        </div>
      </div>
      <!-- The simple and badly written cronometer -->
      <button id="bad-chrono" class="bad-buttons">Skip Ad...</button>
    </div>

    <script type="text/javascript">
      (function (window, document) {
        const adSuccess = () =>
          window.top.postMessage({ type: "success" }, "*");
        const adFail = () => window.top.postMessage({ type: "fail" }, "*");
        const getVideoInfo = () =>
          window.top.postMessage({ type: "getVideoInfo" }, "*");

        const isMobile =
          /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
            navigator.userAgent,
          );

        window.removeEventListener("message", null);

        // The simple and badly written cronometer: You can skip the ad, after the video finishes
        // It's deviousness lies in its simplicity, the button cannot be clicked thus the ad cannot be skipped
        // It can be used to show the cool videos the rest of the participants submited.
        const badChrono = document.getElementById("bad-chrono");
        const delay = 1; //  1 second

        setInterval(() => {
          getVideoInfo();
        }, 1000);

        window.addEventListener("message", (event) => {
          if (event.data.type === "videoInfo") {
            const { currentTime, duration, paused } = event.data;

            if (paused) {
              badChrono.innerText = "Please resume the ad";
            } else {
              const remaining = duration - currentTime + delay;

              const minutes = `${Math.floor(remaining / 60)}`.padStart(2, 0);
              const seconds = `${Math.floor(remaining % 60)}`.padStart(2, 0);

              badChrono.style.display = "block";
              badChrono.innerText = `Skip ad in... ${minutes}:${seconds}`;
            }
          }

          if (event.data.type === "adFinished") {
            badChrono.style.display = "none";
            adFail();
          }
        });
      })(window, document);
    </script>
